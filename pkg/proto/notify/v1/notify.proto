syntax = "proto3";

package notify.v1;

option go_package = "github.com/Sakuya1998/ops-platform/pkg/proto/notify/v1;notifyv1";

import "google/protobuf/timestamp.proto";

message Empty {}

message NotificationChannel {
  string id = 1;
  string org_id = 2;
  string name = 3;
  string channel_type = 4;
  string config_json = 5;
  bool is_enabled = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message NotificationTemplate {
  string id = 1;
  string channel_type = 2;
  string name = 3;
  string title_template = 4;
  string body_template = 5;
  google.protobuf.Timestamp created_at = 6;
}

message NotificationLog {
  string id = 1;
  string channel_id = 2;
  string event_type = 3;
  string recipient = 4;
  string title = 5;
  string status = 6;
  string error_msg = 7;
  google.protobuf.Timestamp created_at = 8;
}

message ListChannelsRequest {
  string org_id = 1;
}

message ListChannelsResponse {
  repeated NotificationChannel channels = 1;
}

message CreateChannelRequest {
  string org_id = 1;
  string name = 2;
  string channel_type = 3;
  string config_json = 4;
  bool is_enabled = 5;
}

message UpdateChannelRequest {
  string id = 1;
  string name = 2;
  string channel_type = 3;
  string config_json = 4;
  bool is_enabled = 5;
}

message DeleteChannelRequest {
  string id = 1;
}

message ListTemplatesRequest {}

message ListTemplatesResponse {
  repeated NotificationTemplate templates = 1;
}

message CreateTemplateRequest {
  string channel_type = 1;
  string name = 2;
  string title_template = 3;
  string body_template = 4;
}

message UpdateTemplateRequest {
  string id = 1;
  string channel_type = 2;
  string name = 3;
  string title_template = 4;
  string body_template = 5;
}

message DeleteTemplateRequest {
  string id = 1;
}

message ListNotificationLogsRequest {
  string event_type = 1;
  string status = 2;
  string start_time = 3;
  string end_time = 4;
  int32 page = 5;
  int32 page_size = 6;
}

message ListNotificationLogsResponse {
  repeated NotificationLog logs = 1;
  int64 total = 2;
}

message SendNotificationRequest {
  string org_id = 1;
  string channel_id = 2;
  string channel_type = 3;
  string event_type = 4;
  string recipient = 5;
  string title = 6;
  string body = 7;
  string template_id = 8;
  string variables_json = 9;
}

message SendNotificationResponse {
  string log_id = 1;
  string status = 2;
  string error_msg = 3;
}

service NotifyService {
  rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse);
  rpc CreateChannel(CreateChannelRequest) returns (NotificationChannel);
  rpc UpdateChannel(UpdateChannelRequest) returns (NotificationChannel);
  rpc DeleteChannel(DeleteChannelRequest) returns (Empty);

  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse);
  rpc CreateTemplate(CreateTemplateRequest) returns (NotificationTemplate);
  rpc UpdateTemplate(UpdateTemplateRequest) returns (NotificationTemplate);
  rpc DeleteTemplate(DeleteTemplateRequest) returns (Empty);

  rpc ListNotificationLogs(ListNotificationLogsRequest) returns (ListNotificationLogsResponse);
  rpc SendNotification(SendNotificationRequest) returns (SendNotificationResponse);
}
